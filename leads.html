<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads Dashboard | LuminaBot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');
    
    :root {
      --bg-main: #0b0f19;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-main);
      background-image: 
        radial-gradient(circle at 10% 20%, var(--accent-glow) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.5) 0%, #090d16 100%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    
    header {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto 24px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    
    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    
    main {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .search-input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      outline: none;
      width: 300px;
      transition: all 0.2s;
    }
    
    .search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    
    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }
    
    .card {
      background: rgba(30, 41, 59, 0.35);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      overflow: hidden;
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .table-container {
      overflow-x: auto;
      flex: 1;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }
    
    th {
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.5);
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    
    td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
      vertical-align: middle;
    }
    
    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
    
    .date-badge {
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .time-badge {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 4px;
    }
    
    .empty-state {
      padding: 100px 40px;
      text-align: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .empty-icon {
      font-size: 48px;
    }
    
    .empty-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }
    
    .empty-desc {
      font-size: 13px;
      max-width: 320px;
      line-height: 1.5;
    }
    
    .action-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* Live indicator */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #34d399;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      animation: live-pulse 1.5s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .new-row {
      animation: row-flash 0.8s ease-out;
    }

    @keyframes row-flash {
      0% { background: rgba(16, 185, 129, 0.15); }
      100% { background: transparent; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon" id="logoIcon">🤖</div>
      <div>
        <h1 class="logo-text" id="logoText">LuminaBot</h1>
        <span class="badge" id="botIdBadge">Bot Leads Dashboard</span>
      </div>
    </div>
    <div class="header-actions">
      <span class="live-badge" id="liveBadge">
        <span class="live-dot"></span>
        Live
      </span>
      <button class="btn btn-secondary" onclick="fetchLeads(false)" id="refreshBtn">🔄 Refresh</button>
    </div>
  </header>

  <main>
    <div class="controls">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name, contact, notes..." oninput="filterLeads()">
      <button class="btn btn-danger" id="clearBtn" onclick="clearAllLeads()">🗑️ Clear All Bookings</button>
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Visitor Name</th>
              <th>Contact Info</th>
              <th>Date & Time</th>
              <th>Notes / Reason</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody id="leadsTableBody">
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">Loading bookings...</td>
            </tr>
          </tbody>
        </table>
        
        <div class="empty-state" id="emptyState" style="display: none;">
          <span class="empty-icon">📅</span>
          <h3 class="empty-title">No Bookings Found</h3>
          <p class="empty-desc">Any appointments submitted through your website chatbot will populate here automatically.</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    const botId = urlParams.get('botId');
    
    let allLeads = [];
    let botThemeColor = '#6366f1';
    let knownIds = new Set(); // track seen booking IDs to detect new ones

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
    }

    async function loadBotBranding() {
      if (!botId || botId === 'DEMO') {
        document.getElementById('logoText').textContent = 'Demo Bot Dashboard';
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/api/bots/${botId}`);
        if (res.ok) {
          const bot = await res.json();
          document.getElementById('logoText').textContent = `${bot.name} Leads`;
          document.getElementById('logoIcon').textContent = bot.avatar || '🤖';
          document.getElementById('botIdBadge').textContent = `ID: ${bot.id}`;
          botThemeColor = bot.color || '#6366f1';
          const logoIconEl = document.getElementById('logoIcon');
          logoIconEl.style.background = `${botThemeColor}22`;
          logoIconEl.style.border = `1px solid ${botThemeColor}44`;
          logoIconEl.style.boxShadow = `0 0 15px ${botThemeColor}25`;
          document.documentElement.style.setProperty('--accent-color', botThemeColor);
          document.documentElement.style.setProperty('--accent-glow', `${botThemeColor}25`);
        }
      } catch (err) {
        console.warn('Failed to load bot details for branding:', err);
      }
    }

    // silent=true means background poll — don't flash loading state
    async function fetchLeads(silent = false) {
      const tableBody = document.getElementById('leadsTableBody');
      const emptyState = document.getElementById('emptyState');
      
      if (!silent) {
        tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">Fetching latest bookings...</td></tr>';
        emptyState.style.display = 'none';
      }

      if (!botId || botId === 'DEMO') {
        const saved = localStorage.getItem('luminabot_demo_bookings');
        const newLeads = saved ? JSON.parse(saved) : [];
        if (!silent || newLeads.length !== allLeads.length) {
          allLeads = newLeads;
          renderLeads(allLeads, silent);
        }
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/bots/${botId}/bookings`);
        if (res.ok) {
          const data = await res.json();
          const newLeads = data.bookings || [];

          // Check if anything is new
          const hasNew = newLeads.some(b => !knownIds.has(b.id));
          
          if (!silent || hasNew) {
            allLeads = newLeads;
            renderLeads(allLeads, silent && hasNew);
          }
        } else if (!silent) {
          tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #fca5a5;">❌ Failed to load bookings. Invalid Bot ID.</td></tr>';
        }
      } catch (err) {
        if (!silent) {
          tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #fca5a5;">❌ Server connection error.</td></tr>';
        }
      }
    }

    function renderLeads(leads, highlightNew = false) {
      const tableBody = document.getElementById('leadsTableBody');
      const emptyState = document.getElementById('emptyState');
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      
      tableBody.innerHTML = '';
      
      const filtered = query ? leads.filter(lead =>
        lead.name.toLowerCase().includes(query) ||
        lead.contact.toLowerCase().includes(query) ||
        (lead.notes || '').toLowerCase().includes(query) ||
        lead.date.includes(query) ||
        lead.time.includes(query)
      ) : leads;

      if (filtered.length === 0) {
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';
      filtered.forEach(lead => {
        const isNew = highlightNew && !knownIds.has(lead.id);
        const tr = document.createElement('tr');
        if (isNew) tr.classList.add('new-row');
        tr.innerHTML = `
          <td style="padding: 16px 20px; font-weight: 600; color: var(--text-main); font-family: 'Outfit', sans-serif;">
            ${isNew ? '<span style="font-size:10px;background:rgba(16,185,129,0.15);color:#34d399;padding:2px 6px;border-radius:8px;font-weight:700;margin-right:6px;">NEW</span>' : ''}
            ${escapeHTML(lead.name)}
          </td>
          <td style="padding: 16px 20px;">${escapeHTML(lead.contact)}</td>
          <td style="padding: 16px 20px;">
            <span class="date-badge" style="background: ${botThemeColor}18; color: var(--accent-color);">${escapeHTML(lead.date)}</span>
            <span class="time-badge">${escapeHTML(lead.time)}</span>
          </td>
          <td style="padding: 16px 20px; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHTML(lead.notes)}">${escapeHTML(lead.notes) || '<span style="color:var(--text-muted); font-style:italic;">None</span>'}</td>
          <td style="padding: 16px 20px; text-align: center;">
            <button class="action-btn" onclick="deleteLead('${lead.id}')">Delete</button>
          </td>
        `;
        tableBody.appendChild(tr);
        knownIds.add(lead.id);
      });
    }

    function filterLeads() {
      renderLeads(allLeads, false);
    }

    async function deleteLead(bookingId) {
      if (!confirm('Are you sure you want to delete this booking lead?')) return;
      if (!botId || botId === 'DEMO') {
        let demo = JSON.parse(localStorage.getItem('luminabot_demo_bookings') || '[]');
        demo = demo.filter(b => b.id !== bookingId);
        localStorage.setItem('luminabot_demo_bookings', JSON.stringify(demo));
        fetchLeads(false);
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/api/bookings/${bookingId}`, { method: 'DELETE' });
        if (res.ok) fetchLeads(false);
        else alert('Failed to delete booking.');
      } catch (err) {
        alert('Server communication error.');
      }
    }

    async function clearAllLeads() {
      if (!confirm('Are you sure you want to delete ALL bookings for this chatbot? This cannot be undone.')) return;
      if (!botId || botId === 'DEMO') {
        localStorage.removeItem('luminabot_demo_bookings');
        fetchLeads(false);
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/api/bots/${botId}/bookings`, { method: 'DELETE' });
        if (res.ok) { knownIds.clear(); fetchLeads(false); }
        else alert('Failed to clear bookings.');
      } catch (e) {
        alert('Server communication error.');
      }
    }

    // Run on load
    loadBotBranding();
    fetchLeads(false);

    // Auto-poll every 5 seconds (silent background refresh)
    setInterval(() => fetchLeads(true), 5000);
  </script>
</body>
</html>
